<body>
    
    <header></header>
    
    <main class="main-frame">
        
        <div class="subiframe">
            <div class="preframe">
                
                <div class="theme-blue">
                    <video data-shaka-player id="video" autoplay="true" preload="auto" poster="https://i.imgur.com/zlzQwXY.jpg"></video>
                </div>
                
                <script>
                    const manifestUri = 'https://teleamazonasb.cdn.mdstrm.com/live-stream-mp/dfzu2jckcs3he/a5e7a2777ea24b8ca49b326b536f87b2/6a0cd90eb3852427fcded197/manifest.mpd';
                    
                    function initApp() {
                        shaka.polyfill.installAll();
                        if (shaka.Player.isBrowserSupported()) {
                            init();
                        } else {
                            console.error('Browser not supported!');
                        }
                    }
                    
                    async function init() {
                        const video = document.getElementById('video');
                        const ui = video['ui'];
                        const controls = ui.getControls();
                        const player = controls.getPlayer();
                        const config = {
                            'seekBarColors': {
                                base: 'rgba(66, 133, 244, 0.35)',
                                buffered: 'rgba(66, 133, 244, 0.6)',
                                played: 'rgba(66, 133, 244, 0.8)',
                            },
                            'volumeBarColors': {
                                base: 'rgba(66, 133, 244, 0.8)',
                                level: 'rgb(66, 133, 244)',
                            }
                        }
                        ui.configure(config);
                        player.configure({
                            drm: {
                                "clearKeys": {
                                    'aa78205160ef4b5c972d5e815a8fe6e4': '338b545591e45469e71dae3a8fb8dbb0'
                                }
                            }
                        });
                        
                        document.addEventListener('keydown', (e) => {
                            const videoContainer = document.querySelector('video');
                            let is_fullscreen = () => !!document.fullscreenElement
                            let audio_vol = video.volume;
                            if (e.key == 'f') {
                                if (is_fullscreen()) {
                                    document.exitFullscreen();
                                } else {
                                    videoContainer.requestFullscreen();
                                }
                                e.preventDefault();
                            }
                            else if (e.key == ' ') {
                                if (video.paused) {
                                    video.play();
                                } else {
                                    video.pause();
                                }
                                e.preventDefault();
                            }
                            else if (e.key == "ArrowUp") {
                                e.preventDefault();
                                if (audio_vol != 1) {
                                    try {
                                        video.volume = audio_vol + 0.05;
                                    }
                                    catch (err) {
                                        video.volume = 1;
                                    }
                                }
                            }
                            else if (e.key == "ArrowDown") {
                                e.preventDefault();
                                if (audio_vol != 0) {
                                    try {
                                        video.volume = audio_vol - 0.05;
                                    }
                                    catch (err) {
                                        video.volume = 0;
                                    }
                                }
                            }
                            
                            else if (e.key == 'm') {
                                e.preventDefault();
                                video.muted = !video.muted;
                            }
                            
                        });
                        
                        window.player = player;
                        window.ui = ui;
                        window.controls = controls;
                        
                        
                        player.addEventListener("error", onPlayerErrorEvent);
                        controls.addEventListener("error", onUIErrorEvent);
                        
                        try {
                            await player.load(manifestUri);
                            console.log('The video has now been loaded!');
                        } catch (error) {
                            onPlayerError(error);
                        }
                        
                        function onPlayerErrorEvent(errorEvent) {
                            onPlayerError(event.detail);
                        }
                        
                        function onPlayerError(error) {
                            console.error('Error code', error.code + ':', 'Video could not be loaded!', '[Media not found].');
                        }
                        
                        function onUIErrorEvent(errorEvent) {
                            onPlayerError(event.detail);
                        }
                    }
                    
                    function initFailed(errorEvent) {
                        console.error('Unable to load the UI library!');
                    }
                    
                    document.addEventListener('shaka-ui-loaded', init);
                    document.addEventListener('shaka-ui-load-failed', initFailed);
                    document.addEventListener('DOMContentLoaded', initApp);
                    
                    Object.defineProperty(navigator, 'userAgent', {
                            get: function() { // Latest (Feb 18, 2024)
                                return 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Firefox/122.0 Edg/121.0.2277.112 OPR/107.0.0.0 UCBrowser/16.3.0.1281 Vivaldi/6.5.3206.63 YaBrowser/23.9.0.2325 Yowser/2.5 Safari/537.36';
                            }
                        }
                        
                    );
                </script>
                
                
            </div>
            <div class="centerfull">
                <button id="btnIframe">
                    REFRESH
                </button>
                
            </div>
            
            
        </div>
        
    </main>
    
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("btnIframe").addEventListener("click", function() {
                window.location.reload();
            });
            
            const url = new URL(window.location.href);
            const queryStrings = url.searchParams;
            const r = queryStrings.get("r");
            
            if (r && r.length > 0) {
                const base64String = r;
                const decodedString = atob(base64String);
                
                document.getElementById("embedIframe").setAttribute("src", decodedString);
            }
        });
        
        // non-active
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        document.onkeydown = function(e) {
            if (e.ctrlKey && e.keyCode === 85) { // 85 adalah keyCode untuk 'U'
                return false;
            }
            
            if (e.keyCode === 123) { // 123 adalah keyCode untuk F12
                return false;
            }
            
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { // 73 adalah keyCode untuk 'I'
                return false;
            }
        };
    </script>
