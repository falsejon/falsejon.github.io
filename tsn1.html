/* 🌈 Efek RGB smooth + rotasi buffer JW Player */
/* Rotasi ikon buffer */
@keyframes jw-buffer-spin {
100% { transform: rotate(360deg); }
}
/* Perubahan warna halus (gradasi lembut) */
@keyframes aurora-buffer {
0%   { color: #ff0000; }   /* merah */
17%  { color: #ff7f00; }   /* oranye */
34%  { color: #ffff00; }   /* kuning */
51%  { color: #00ff00; }   /* hijau muda */
68%  { color: #00ffff; }   /* cyan */
85%  { color: #0000ff; }   /* biru */
100% { color: #ff00ff; }   /* ungu -&gt; balik ke merah */
}
/* Gabungkan animasi muter + warna lembut + efek glow */
.jw-svg-icon-buffer {
animation: jw-buffer-spin 1.0s linear infinite,
aurora-buffer 4s ease-in-out infinite !important;
filter: drop-shadow(0 0 1px currentColor) drop-shadow(0 0 0px currentColor);
transition: color 0.5s ease;
}
/* Pastikan warna diterapkan ke SVG */
.jw-svg-icon-buffer svg path {
fill: currentColor !important;
stroke: currentColor !important;
}

                          <video autoplay="" data-shaka-player="" id="youtube-theme" poster="" style="width:100vw;height:100vh">

                  <!-- ================= SCRIPT ================= -->
                  <script>
                    let currentIndex = 0;
let activePlayer = &#34;jw&#34;;
let shakaPlayer = null;

/* ================= JW PLAYER ================= */
function buildJW(){
  const s = streams[currentIndex];

  jwplayer(&#34;jwplayer&#34;).setup({
    playlist:[{
      sources:[{
        file: s.file,
        type: s.type,
        drm: s.keyId ? {
          clearkey:{
            keyId: s.keyId,
            key: s.key
          }
        } : undefined
      }]
    }],
    width: &#34;100%&#34;,
    height: &#34;100%&#34;,
    aspectratio: &#34;16:9&#34;,
    autostart: true
  });
}

/* ================= SHAKA PLAYER ================= */
async function initShaka(){
  const s = streams[currentIndex];
  const video = document.getElementById(&#34;youtube-theme&#34;);
  const ui = video.ui;

  ui.configure({
    seekBarColors:{
      base:&#39;rgba(255,255,255,.2)&#39;,
      buffered:&#39;rgba(255,255,255,.4)&#39;,
      played:&#39;rgb(255,0,0)&#39;
    }
  });

  const controls = ui.getControls();
  const player = controls.getPlayer();

  if(s.keyId &amp;&amp; s.key){
    player.configure({
      drm:{ clearKeys:{ [s.keyId]: s.key } }
    });
  }

  shakaPlayer = player;
  await player.load(s.file);

  $(&#39;.shaka-overflow-menu-button&#39;).html(&#39;settings&#39;);
  $(&#39;.shaka-back-to-overflow-button .material-icons-round&#39;)
    .html(&#39;arrow_back_ios_new&#39;);
}

/* ================= SWITCH PLAYER ================= */
function setPlayer(p){
  // 🔥 Tambahkan refresh jika pindah dari Shaka &amp;#8594; JW
  if(p === &#34;jw&#34; &amp;&amp; activePlayer === &#34;shaka&#34;){
    location.reload();
    return;
  }

  activePlayer = p;

  document.getElementById(&#34;jwBox&#34;).style.display =
    p===&#34;jw&#34; ? &#34;block&#34; : &#34;none&#34;;
  document.getElementById(&#34;shakaBox&#34;).style.display =
    p===&#34;shaka&#34; ? &#34;block&#34; : &#34;none&#34;;

  if(p===&#34;jw&#34;){
    // bersihin Shaka + JW lama
    if(shakaPlayer){
      shakaPlayer.destroy();
      shakaPlayer = null;
    }
    jwplayer(&#34;jwplayer&#34;).remove();
    buildJW();
  }else{
    jwplayer(&#34;jwplayer&#34;).remove();
    initShaka();
  }
}

/* ================= SWITCH CHANNEL ================= */
function switchChannel(i){
  currentIndex = i;

  if(activePlayer===&#34;jw&#34;){
    jwplayer(&#34;jwplayer&#34;).remove();
    buildJW();
  }else{
    if(shakaPlayer){
      shakaPlayer.destroy();
      shakaPlayer = null;
    }
    initShaka();
  }
}

/* ================= INIT ================= */
window.onload = () =&gt; {
  jwplayer(&#34;jwplayer&#34;).remove();
  buildJW();
};
